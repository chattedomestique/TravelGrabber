name: Deploy PWA to GitHub Pages

# Deploys the static PWA to GitHub Pages on every push to main, so deploys are
# config-as-code rather than a per-deploy dashboard action.
#
# One-time setup (required once): Settings → Pages → Source → "GitHub Actions".
# The default Actions GITHUB_TOKEN can't enable Pages itself, so this single
# toggle has to be flipped by hand; after that every push auto-deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html app.js manifest.webmanifest sw.js icon.svg _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
